    <meta name="theme-color" content="#f5f5f5">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 420px; margin: auto; padding: 20px; background: #fff; }
        h1 { font-size: 28px; text-align: center; margin-bottom: 20px; }
        button { background: #007aff; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; margin: 10px 0; }
        button.secondary { background: #e5e5ea; color: #000; }
        #result-box { text-align: center; margin: 20px 0; display: none; }
        #result-box img { max-width: 100%; border-radius: 16px; margin-top: 10px; max-height: 250px; object-fit: cover; }
        #result-box h2 { margin: 10px 0; }
        ul { list-style: none; padding: 0; }
        li { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; position: relative; }
        li img { width: 50px; height: 50px; object-fit: cover; border-radius: 12px; margin-right: 12px; }
        li .info { flex: 1; }
        li .actions { display: flex; gap: 8px; }
        li .actions button { width: auto; padding: 6px 12px; font-size: 14px; background: #f0f0f0; color: #333; }
        li .actions button.danger { background: #ff3b30; color: white; }
        .add-form { margin-top: 25px; background: #f9f9f9; padding: 15px; border-radius: 16px; }
        .add-form input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; font-size: 16px; }
        .add-form input[type="file"] { margin-bottom: 10px; }
        .edit-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .edit-popup-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; }
        .edit-popup-content h3 { margin-bottom: 15px; }
        .edit-popup-content input { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .edit-popup-content .btn-row { display: flex; gap: 10px; }
        .edit-popup-content .btn-row button { flex: 1; }
    </style>
</head>
<body>
    <h1>🍱 中午吃什么？</h1>
    <button id="randomBtn">🎲 随机一下！</button>

    <div id="result-box">
        <h2 id="result-name"></h2>
        <img id="result-img" src="" alt="">
        <button class="secondary" id="rerollBtn" style="margin-top:10px;">🔄 再抽一次</button>
    </div>

    <h2 style="margin-top:25px;">我的菜品</h2>
    <ul id="dishList"></ul>
    <p id="emptyHint" style="color:gray; text-align:center; margin:20px;">还没有菜品，快添加吧～</p>

    <div class="add-form">
        <h3>➕ 添加一道菜</h3>
        <input type="text" id="dishName" placeholder="菜名，如：麻辣烫">
        <input type="file" id="dishImage" accept="image/*">
        <button id="addBtn">保存</button>
    </div>

    <!-- 隐藏的编辑弹窗 -->
    <div id="editPopup" class="edit-popup" style="display:none;">
        <div class="edit-popup-content">
            <h3>修改菜品</h3>
            <input type="text" id="editName" placeholder="新菜名">
            <label style="display:block; margin-bottom: 10px; color: gray;">更换图片（可选）</label>
            <input type="file" id="editImage" accept="image/*">
            <div class="btn-row">
                <button id="saveEditBtn">保存</button>
                <button id="cancelEditBtn" class="secondary">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- IndexedDB ----------
        const dbName = "FoodRandomDB";
        const storeName = "dishes";
        let db;

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadDishes();
        };

        function addDish(name, imageDataUrl) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, "readwrite");
                const store = tx.objectStore(storeName);
                const dish = { name, image: imageDataUrl, timestamp: Date.now() };
                const req = store.add(dish);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function updateDish(id, newName, newImageDataUrl) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, "readwrite");
                const store = tx.objectStore(storeName);
                const getReq = store.get(id);
                getReq.onsuccess = () => {
                    const dish = getReq.result;
                    if (!dish) return reject("not found");
                    dish.name = newName;
                    if (newImageDataUrl) dish.image = newImageDataUrl;
                    const putReq = store.put(dish);
                    putReq.onsuccess = () => resolve();
                    putReq.onerror = () => reject(putReq.error);
                };
                getReq.onerror = () => reject(getReq.error);
            });
        }

        function deleteDish(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, "readwrite");
                const store = tx.objectStore(storeName);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        function getAllDishes() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, "readonly");
                const store = tx.objectStore(storeName);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        // ---------- UI ----------
        const randomBtn = document.getElementById("randomBtn");
        const rerollBtn = document.getElementById("rerollBtn");
        const resultBox = document.getElementById("result-box");
        const resultName = document.getElementById("result-name");
        const resultImg = document.getElementById("result-img");
        const dishList = document.getElementById("dishList");
        const emptyHint = document.getElementById("emptyHint");
        const addBtn = document.getElementById("addBtn");
        const dishNameInput = document.getElementById("dishName");
        const dishImageInput = document.getElementById("dishImage");

        // 编辑弹窗相关
        const editPopup = document.getElementById("editPopup");
        const editNameInput = document.getElementById("editName");
        const editImageInput = document.getElementById("editImage");
        const saveEditBtn = document.getElementById("saveEditBtn");
        const cancelEditBtn = document.getElementById("cancelEditBtn");
        let editingDishId = null;

        let currentDishes = [];

        async function loadDishes() {
            currentDishes = await getAllDishes();
            renderList();
        }

        function renderList() {
            dishList.innerHTML = "";
            if (currentDishes.length === 0) {
                emptyHint.style.display = "block";
            } else {
                emptyHint.style.display = "none";
                currentDishes.forEach(dish => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <img src="${dish.image}" alt="">
                        <div class="info">${dish.name}</div>
                        <div class="actions">
                            <button class="edit-btn">✏️</button>
                            <button class="delete-btn danger">🗑️</button>
                        </div>
                    `;
                    // 绑定事件
                    li.querySelector(".edit-btn").onclick = () => openEditPopup(dish.id, dish.name);
                    li.querySelector(".delete-btn").onclick = () => deleteDishConfirm(dish.id);
                    dishList.appendChild(li);
                });
            }
        }

        randomBtn.onclick = () => {
            if (currentDishes.length === 0) {
                alert("还没有菜品，先添加几个吧！");
                return;
            }
            const randomIndex = Math.floor(Math.random() * currentDishes.length);
            const dish = currentDishes[randomIndex];
            resultName.textContent = `今天吃：${dish.name}！`;
            resultImg.src = dish.image;
            resultBox.style.display = "block";
            resultBox.scrollIntoView({ behavior: "smooth" });
        };

        rerollBtn.onclick = () => randomBtn.onclick();

        addBtn.onclick = async () => {
            const name = dishNameInput.value.trim();
            if (!name) return alert("请输入菜名");
            const file = dishImageInput.files[0];
            if (!file) return alert("请选择一张图片");

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDish(name, e.target.result);
                dishNameInput.value = "";
                dishImageInput.value = "";
                await loadDishes();
            };
            reader.readAsDataURL(file);
        };

        // ---------- 编辑功能 ----------
        function openEditPopup(id, currentName) {
            editingDishId = id;
            editNameInput.value = currentName;
            editImageInput.value = ""; // 清空文件选择
            editPopup.style.display = "flex";
        }

        cancelEditBtn.onclick = () => {
            editPopup.style.display = "none";
            editingDishId = null;
        };

        saveEditBtn.onclick = async () => {
            const newName = editNameInput.value.trim();
            if (!newName) return alert("菜名不能为空");
            const file = editImageInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await updateDish(editingDishId, newName, e.target.result);
                    editPopup.style.display = "none";
                    editingDishId = null;
                    await loadDishes();
                };
                reader.readAsDataURL(file);
            } else {
                // 不换图
                await updateDish(editingDishId, newName, null);
                editPopup.style.display = "none";
                editingDishId = null;
                await loadDishes();
            }
        };

        // 点击弹窗外部关闭（可选）
        editPopup.onclick = (e) => {
            if (e.target === editPopup) {
                editPopup.style.display = "none";
                editingDishId = null;
            }
        };

        // ---------- 删除功能 ----------
        function deleteDishConfirm(id) {
            if (confirm("确定删除这道菜吗？")) {
                deleteDish(id).then(() => loadDishes());
            }
        }

        // PWA 离线支持
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:application/javascript;base64,' +
                    btoa(`self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`)
                );
            });
        }
    </script>
</body>
</html>
